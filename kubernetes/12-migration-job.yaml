apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration
  namespace: shopeasy
spec:
  template:
    spec:
      containers:
      - name: migration
        image: trainwithshubham/shopeasy-migration:1
        imagePullPolicy: Always
        env:
        - name: MONGODB_URI
          value: "mongodb://mongodb-service:27017/shopeasy"
      restartPolicy: OnFailure
