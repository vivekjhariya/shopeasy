replicaCount: 1

image:
  repository: public.ecr.aws/eks/aws-load-balancer-controller
  tag: v2.6.2

clusterName: ${CLUSTER_NAME}

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: ${ROLE_ARN}
  name: aws-load-balancer-controller

region: ${AWS_REGION}
vpcId: ${VPC_ID}

enableShield: false
enableWaf: false
enableWafv2: false